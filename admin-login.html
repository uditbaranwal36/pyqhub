<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — PYQ Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <nav class="container nav">
    <a href="index.html" class="brand">
      <span class="brand-mark">PYQ</span>
      <span class="brand-name">Hub</span>
    </a>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">&#9776;</button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="browse.html">Browse Papers</a></li>
      <li><a href="search-results.html">Search</a></li>
      <li><a href="admin-login.html" class="active">Admin</a></li>
    </ul>
  </nav>
</header>

<section class="section">
  <div class="container">
    <div class="form-card">
      <span class="section-eyebrow">Restricted area</span>
      <h2>Admin login</h2>
      <p class="form-sub">Sign in to upload new question papers to PYQ Hub.</p>

      <div id="loginAlert"></div>

      <form id="adminLoginForm" class="form-stack">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Log in</button>
      </form>

      <p style="margin-top: 20px; font-size: 0.85rem; color: rgba(43,43,43,0.55);">
        <!-- password :- -->
        <!-- username: admin , password: pyqhub123  -->
      </p>
    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="container">
    <div class="footer-top">
      <div class="footer-brand">PYQ Hub</div>
      <div class="footer-cols">
        <div class="footer-col">
          <h4>Site</h4>
          <a href="index.html">Home</a>
          <a href="browse.html">Browse Papers</a>
          <a href="search-results.html">Search</a>
        </div>
        <div class="footer-col">
          <h4>Admin</h4>
          <a href="admin-login.html">Admin Login</a>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      <span>&copy; 2026 PYQ Hub. A student project.</span>
      <span>Built for exam season survival.</span>
    </div>
  </div>
</footer>

<script src="data.js"></script>
<script src="main.js"></script>
</body>
</html>
